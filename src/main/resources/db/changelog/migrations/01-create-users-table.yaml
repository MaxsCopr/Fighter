databaseChangeLog:
  - changeSet:
      id: 01-create-users-table
      author: auth-service
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: full_name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: email
                  type: VARCHAR(150)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: password
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: role
                  type: VARCHAR(20)
                  defaultValue: USER
                  constraints:
                    nullable: false
              - column:
                  name: enabled
                  type: NUMBER(1)
                  defaultValueNumeric: 1
                  constraints:
                    nullable: false
              - column:
                  name: account_non_locked
                  type: NUMBER(1)
                  defaultValueNumeric: 1
                  constraints:
                    nullable: false
              - column:
                  name: account_non_expired
                  type: NUMBER(1)
                  defaultValueNumeric: 1
                  constraints:
                    nullable: false
              - column:
                  name: credentials_non_expired
                  type: NUMBER(1)
                  defaultValueNumeric: 1
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: last_login_at
                  type: TIMESTAMP
