databaseChangeLog:
  - changeSet:
      id: 04-rename-password-column
      author: auth-service
      preConditions:
        - onFail: MARK_RAN
        - onError: MARK_RAN
        - columnExists:
            tableName: users
            columnName: password
        - not:
            columnExists:
              tableName: users
              columnName: password_hash
      changes:
        - renameColumn:
            tableName: users
            oldColumnName: password
            newColumnName: password_hash
            columnDataType: VARCHAR(255)
