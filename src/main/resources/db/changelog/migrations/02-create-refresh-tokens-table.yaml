databaseChangeLog:
  - changeSet:
      id: 02-create-refresh-tokens-table
      author: auth-service
      changes:
        - createTable:
            tableName: refresh_tokens
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: token
                  type: VARCHAR(512)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_refresh_tokens_user
                    references: users(id)
                    deleteCascade: true
              - column:
                  name: expires_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: revoked
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
        - createIndex:
            indexName: idx_refresh_token_value
            tableName: refresh_tokens
            columns:
              - column:
                  name: token
        - createIndex:
            indexName: idx_refresh_token_user
            tableName: refresh_tokens
            columns:
              - column:
                  name: user_id